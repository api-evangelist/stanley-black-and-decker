principles:
  - name: Visibility
    description: End-customer fleet managers see consumption in the DEWALT Site Manager dashboard. API partners surface tool inventory and asset-tracking events through the Tool Connect API; cost visibility for the underlying subscription is on the customer's invoice from Stanley Black & Decker.
  - name: Allocation
    description: Allocate Tool Connect subscription cost to the fleet / jobsite that owns the connected tools. Tag tools at registration with site, project, and crew so consumption rolls up to the right cost center.
  - name: Optimization
    description: Right-size the connected-tool fleet to active jobsites, retire stale assignments, and consolidate Tool Connect subscriptions across business units where the licensing model permits. Renegotiate partner API access at renewal as integration volume grows.
  - name: Accountability
    description: Construction / fleet operations team owns the Tool Connect subscription; integration partners own their API consumption budget under their partner agreement.
