description: Stanley Black & Decker exposes the DEWALT Tool Connect and Stanley X IoT APIs through partner agreements rather than a self-serve developer portal. The dewalt.com Tool Connect product page mentions "Additional subscription charge and third-party data charges may apply" but does not publish API access fees, partner-tier pricing, or rate-limit numbers. Treat as a Contact Sales / partner-only artifact until a public API price list is released.
sources:
  - https://www.dewalt.com/systems/tool-connect
  - https://sitemanager.dewalt.com/
notes: B2B / partner-only API access. No self-serve pricing page. End-customer Tool Connect subscription fees are mentioned in marketing copy but not disclosed publicly; integrator API access is negotiated with the Stanley Black & Decker / DEWALT partner team.
