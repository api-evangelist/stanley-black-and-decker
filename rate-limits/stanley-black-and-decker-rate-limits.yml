description: Rate limits for the DEWALT Tool Connect and Stanley X IoT APIs are not publicly documented. Access is partner-gated; numeric throughput, headers, and retry semantics are defined per partner contract. No published thresholds were reconcilable.
sources:
  - https://www.dewalt.com/systems/tool-connect
  - https://sitemanager.dewalt.com/
notes: B2B / partner-only API. No public rate-limit documentation. Effective limits are set in the partner agreement and accessed via the DEWALT Site Manager partner portal.
responseCodes:
  throttled: 429
limits:
  - name: Partner Contract Limit
    scope: partner-account
    metric: varies
    limit: per partner agreement; not publicly documented
    notes: Throughput is bounded by the negotiated contract; consult the DEWALT / Stanley Black & Decker partner team for the binding numbers.
policies:
  - name: Partner-Defined Throttling
    description: Stanley Black & Decker enforces throttling and quotas at the gateway tier in front of Tool Connect / Stanley X IoT; specifics are shared with onboarded partners and are not on a public docs page.
  - name: Backoff
    description: Generic exponential backoff with jitter is recommended in the absence of vendor-published Retry-After semantics; consult partner documentation for the exact response contract.
maintainers:
  - name: Stanley Black & Decker
    url: https://www.stanleyblackanddecker.com/
