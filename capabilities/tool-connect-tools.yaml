naftiko: 1.0.0-alpha2
info:
  label: Stanley Black & Decker Tool Connect API — Tools
  description: 'Stanley Black & Decker Tool Connect API — Tools. 3 operations. Lead operation: List Tools. Self-contained
    Naftiko capability covering one Stanley Black And Decker business surface.'
  tags:
  - Stanley Black And Decker
  - Tools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STANLEY_BLACK_AND_DECKER_API_KEY: STANLEY_BLACK_AND_DECKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: tool-connect-tools
    baseUri: https://api.dewalt.com
    description: Stanley Black & Decker Tool Connect API — Tools business capability. Self-contained, no shared references.
    resources:
    - name: v1-tools
      path: /v1/tools
      operations:
      - name: listtools
        method: GET
        description: List Tools
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobsiteId
          in: query
          type: string
          description: Filter tools by jobsite
        - name: status
          in: query
          type: string
          description: Filter by connectivity status
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return
        - name: offset
          in: query
          type: integer
          description: Pagination offset
    - name: v1-tools-toolId
      path: /v1/tools/{toolId}
      operations:
      - name: gettool
        method: GET
        description: Get Tool
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: toolId
          in: path
          type: string
          description: The unique identifier of the tool
          required: true
    - name: v1-tools-toolId-usage
      path: /v1/tools/{toolId}/usage
      operations:
      - name: gettoolusage
        method: GET
        description: Get Tool Usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: toolId
          in: path
          type: string
          description: The unique identifier of the tool
          required: true
        - name: startDate
          in: query
          type: string
          description: Start date for usage data (ISO 8601)
        - name: endDate
          in: query
          type: string
          description: End date for usage data (ISO 8601)
    authentication:
      type: bearer
      token: '{{env.STANLEY_BLACK_AND_DECKER_API_KEY}}'
  exposes:
  - type: rest
    namespace: tool-connect-tools-rest
    port: 8080
    description: REST adapter for Stanley Black & Decker Tool Connect API — Tools. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/tools
      name: v1-tools
      description: REST surface for v1-tools.
      operations:
      - method: GET
        name: listtools
        description: List Tools
        call: tool-connect-tools.listtools
        with:
          jobsiteId: rest.jobsiteId
          status: rest.status
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/tools/{toolid}
      name: v1-tools-toolid
      description: REST surface for v1-tools-toolId.
      operations:
      - method: GET
        name: gettool
        description: Get Tool
        call: tool-connect-tools.gettool
        with:
          toolId: rest.toolId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/tools/{toolid}/usage
      name: v1-tools-toolid-usage
      description: REST surface for v1-tools-toolId-usage.
      operations:
      - method: GET
        name: gettoolusage
        description: Get Tool Usage
        call: tool-connect-tools.gettoolusage
        with:
          toolId: rest.toolId
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tool-connect-tools-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stanley Black & Decker Tool Connect API — Tools. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-tools
      description: List Tools
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-tools.listtools
      with:
        jobsiteId: tools.jobsiteId
        status: tools.status
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tool
      description: Get Tool
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-tools.gettool
      with:
        toolId: tools.toolId
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tool-usage
      description: Get Tool Usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-tools.gettoolusage
      with:
        toolId: tools.toolId
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
