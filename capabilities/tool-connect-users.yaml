naftiko: 1.0.0-alpha2
info:
  label: Stanley Black & Decker Tool Connect API — Users
  description: 'Stanley Black & Decker Tool Connect API — Users. 1 operations. Lead operation: List Users. Self-contained
    Naftiko capability covering one Stanley Black And Decker business surface.'
  tags:
  - Stanley Black And Decker
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STANLEY_BLACK_AND_DECKER_API_KEY: STANLEY_BLACK_AND_DECKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: tool-connect-users
    baseUri: https://api.dewalt.com
    description: Stanley Black & Decker Tool Connect API — Users business capability. Self-contained, no shared references.
    resources:
    - name: v1-users
      path: /v1/users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.STANLEY_BLACK_AND_DECKER_API_KEY}}'
  exposes:
  - type: rest
    namespace: tool-connect-users-rest
    port: 8080
    description: REST adapter for Stanley Black & Decker Tool Connect API — Users. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/users
      name: v1-users
      description: REST surface for v1-users.
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: tool-connect-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tool-connect-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stanley Black & Decker Tool Connect API — Users. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-users
      description: List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-users.listusers
      outputParameters:
      - type: object
        mapping: $.
