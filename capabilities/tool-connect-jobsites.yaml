naftiko: 1.0.0-alpha2
info:
  label: Stanley Black & Decker Tool Connect API — Jobsites
  description: 'Stanley Black & Decker Tool Connect API — Jobsites. 3 operations. Lead operation: List Jobsites. Self-contained
    Naftiko capability covering one Stanley Black And Decker business surface.'
  tags:
  - Stanley Black And Decker
  - Jobsites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STANLEY_BLACK_AND_DECKER_API_KEY: STANLEY_BLACK_AND_DECKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: tool-connect-jobsites
    baseUri: https://api.dewalt.com
    description: Stanley Black & Decker Tool Connect API — Jobsites business capability. Self-contained, no shared references.
    resources:
    - name: v1-jobsites
      path: /v1/jobsites
      operations:
      - name: listjobsites
        method: GET
        description: List Jobsites
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createjobsite
        method: POST
        description: Create Jobsite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-jobsites-jobsiteId
      path: /v1/jobsites/{jobsiteId}
      operations:
      - name: getjobsite
        method: GET
        description: Get Jobsite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobsiteId
          in: path
          type: string
          description: The unique identifier of the jobsite
          required: true
    authentication:
      type: bearer
      token: '{{env.STANLEY_BLACK_AND_DECKER_API_KEY}}'
  exposes:
  - type: rest
    namespace: tool-connect-jobsites-rest
    port: 8080
    description: REST adapter for Stanley Black & Decker Tool Connect API — Jobsites. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/jobsites
      name: v1-jobsites
      description: REST surface for v1-jobsites.
      operations:
      - method: GET
        name: listjobsites
        description: List Jobsites
        call: tool-connect-jobsites.listjobsites
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createjobsite
        description: Create Jobsite
        call: tool-connect-jobsites.createjobsite
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/jobsites/{jobsiteid}
      name: v1-jobsites-jobsiteid
      description: REST surface for v1-jobsites-jobsiteId.
      operations:
      - method: GET
        name: getjobsite
        description: Get Jobsite
        call: tool-connect-jobsites.getjobsite
        with:
          jobsiteId: rest.jobsiteId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tool-connect-jobsites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stanley Black & Decker Tool Connect API — Jobsites. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-jobsites
      description: List Jobsites
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-jobsites.listjobsites
      outputParameters:
      - type: object
        mapping: $.
    - name: create-jobsite
      description: Create Jobsite
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tool-connect-jobsites.createjobsite
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-jobsite
      description: Get Jobsite
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-jobsites.getjobsite
      with:
        jobsiteId: tools.jobsiteId
      outputParameters:
      - type: object
        mapping: $.
