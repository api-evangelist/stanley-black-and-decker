naftiko: 1.0.0-alpha2
info:
  label: Stanley Black & Decker Tool Connect API — Assets
  description: 'Stanley Black & Decker Tool Connect API — Assets. 3 operations. Lead operation: List Assets. Self-contained
    Naftiko capability covering one Stanley Black And Decker business surface.'
  tags:
  - Stanley Black And Decker
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STANLEY_BLACK_AND_DECKER_API_KEY: STANLEY_BLACK_AND_DECKER_API_KEY
capability:
  consumes:
  - type: http
    namespace: tool-connect-assets
    baseUri: https://api.dewalt.com
    description: Stanley Black & Decker Tool Connect API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: v1-assets
      path: /v1/assets
      operations:
      - name: listassets
        method: GET
        description: List Assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter by asset type
        - name: jobsiteId
          in: query
          type: string
          description: Filter assets by jobsite
        - name: limit
          in: query
          type: integer
      - name: registerasset
        method: POST
        description: Register Asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-assets-assetId
      path: /v1/assets/{assetId}
      operations:
      - name: getasset
        method: GET
        description: Get Asset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: assetId
          in: path
          type: string
          description: The unique identifier of the asset
          required: true
    authentication:
      type: bearer
      token: '{{env.STANLEY_BLACK_AND_DECKER_API_KEY}}'
  exposes:
  - type: rest
    namespace: tool-connect-assets-rest
    port: 8080
    description: REST adapter for Stanley Black & Decker Tool Connect API — Assets. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/assets
      name: v1-assets
      description: REST surface for v1-assets.
      operations:
      - method: GET
        name: listassets
        description: List Assets
        call: tool-connect-assets.listassets
        with:
          type: rest.type
          jobsiteId: rest.jobsiteId
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: registerasset
        description: Register Asset
        call: tool-connect-assets.registerasset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/assets/{assetid}
      name: v1-assets-assetid
      description: REST surface for v1-assets-assetId.
      operations:
      - method: GET
        name: getasset
        description: Get Asset
        call: tool-connect-assets.getasset
        with:
          assetId: rest.assetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tool-connect-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stanley Black & Decker Tool Connect API — Assets. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-assets
      description: List Assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-assets.listassets
      with:
        type: tools.type
        jobsiteId: tools.jobsiteId
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: register-asset
      description: Register Asset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tool-connect-assets.registerasset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-asset
      description: Get Asset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tool-connect-assets.getasset
      with:
        assetId: tools.assetId
      outputParameters:
      - type: object
        mapping: $.
